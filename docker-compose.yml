version: '3.8'

services:
  db:
    image: postgres:15
    container_name: flowlyx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flowlyx
    ports:
      - '5433:5432'
    volumes:
      - flowlyx_new_db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowlyx-redis
    environment:
      REDIS_PASSWORD: password
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    ports:
      - '6379:6379'
    volumes:
      - flowlyx_redis_data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: flowlyx-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: flowlyx-grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - flowlyx_grafana_data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    container_name: flowlyx-loki
    ports:
      - '3100:3100'
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - flowlyx_loki_data:/tmp/loki

volumes:
  flowlyx_new_db_data:
  flowlyx_redis_data:
  flowlyx_grafana_data:
  flowlyx_loki_data:
