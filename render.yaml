services:
  - type: web
    name: flowlyx-api
    env: node
    # Build the entire monorepo from the root
    buildCommand: npm install && npm run build
    # Start the API application
    startCommand: cd apps/api && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '4000'
      - key: DATABASE_URL
        sync: false # Set this manualy in the Render Dashboard with your PostgreSQL URL
